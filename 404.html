<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'none'; img-src 'self' data:; object-src 'none'; base-uri 'self'"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>Page Not Found — FYNNECT</title>
<meta name="robots" content="noindex"/>
<link rel="stylesheet" href="assets/fonts.css"/>
<link rel="icon" href="/favicon.ico" sizes="48x48"/>
<link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon-192.png"/>
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --ink:#0C0B09; --cream:#F6F3EE; --gold:#B09A72; --gold-light:#C9B48F; }
body {
  font-family:'Jost',system-ui,sans-serif; font-weight:300;
  background: linear-gradient(160deg, #0F0E0B 0%, #1A1814 40%, #0C0B09 100%);
  color: var(--cream);
  min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:32px;
}
.num { font-family:'Cormorant Garamond',Georgia,serif; font-size:7rem; font-weight:400; color:var(--gold); line-height:1; }
h1 { font-family:'Cormorant Garamond',Georgia,serif; font-weight:500; font-size:2rem; margin:18px 0 10px; }
h1 em { font-style:italic; color:var(--gold-light); }
p { color:rgba(246,243,238,0.65); max-width:420px; margin:0 auto 32px; line-height:1.7; }
.btn {
  display:inline-block; font-size:0.78rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
  text-decoration:none; padding:14px 30px; color:var(--ink); background:var(--gold); border-radius:2px;
  transition: background 0.3s ease;
}
.btn:hover { background: var(--gold-light); }
</style>
</head>
<body>
<div>
  <div class="num">404</div>
  <h1>This page has <em>wandered off.</em></h1>
  <p>The page you're looking for doesn't exist or has moved. Let's get you back to planning what matters.</p>
  <a href="/" class="btn">Back to Home</a>
</div>
</body>
</html>
